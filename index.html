<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerenciador de Fila - Valet</title>
    
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --primary: #4CAF50; --danger: #f44336; --info: #2196F3; --warning: #ff9800; --text: #ffffff; }
        body { font-family: Arial, sans-serif; background-color: var(--bg-color); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        
        /* MENU LATERAL */
        .btn-menu { position: fixed; top: 20px; left: 20px; font-size: 2rem; color: var(--primary); background: transparent; border: none; cursor: pointer; z-index: 2001; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1999; display: none; }
        .overlay.ativo { display: block; }
        
        .menu-lateral { position: fixed; top: 0; left: -300px; width: 280px; height: 100%; background: #1a1a1a; border-right: 2px solid #333; z-index: 2000; transition: 0.3s ease; padding-top: 80px; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .menu-lateral.aberto { left: 0; }
        .menu-item { padding: 18px 25px; color: #fff; font-size: 1.2rem; cursor: pointer; border-bottom: 1px solid #333; font-weight: bold; }
        .menu-item:hover { background: #333; color: var(--primary); }
        .menu-danger { color: var(--danger); margin-top: auto; border-top: 1px solid #333; border-bottom: none; }
        .menu-danger:hover { color: #fff; background: var(--danger); }

        .container-logo { display: flex; justify-content: center; align-items: center; width: 100%; margin-bottom: 25px; margin-top: 20px; }
        
        /* ABAS CENTRAIS */
        .view-toggle { margin-bottom: 20px; display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 900px;}
        .btn-aba { flex: 1; min-width: 110px; padding: 15px 10px; background: #3c3c3c; color: #aaaaaa; opacity: 0.8; font-weight: normal; border: none; border-radius: 5px; cursor: pointer;}
        .btn-aba.active { background: var(--info); color: #ffffff; opacity: 1; font-weight: bold; }
        
        .container { width: 100%; max-width: 600px; background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        .container-largo { max-width: 1000px; }

        .form-grupo { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .form-grupo input, .form-grupo select { padding: 15px; font-size: 1.2rem; border-radius: 10px; border: 1px solid #444; background: #000; color: var(--primary); text-align: center; font-weight: bold; }

        button { padding: 15px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: white; transition: 0.2s; }
        .btn-enviar { background: var(--primary); }
        .btn-limpar { background: var(--danger); }
        .btn-baixa { background: var(--primary); padding: 8px 15px;}
        .btn-buscar { background: var(--info); padding: 8px 15px; }
        .btn-excluir { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 8px 15px; }
        
        .botoes-acao { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        .grid-2-colunas { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left;}
        .coluna-painel { background: #222; padding: 15px; border-radius: 10px; min-height: 300px;}
        .coluna-painel h3 { margin-top: 0; text-align: center; border-bottom: 2px solid #444; padding-bottom: 10px; }

        .item-fila { background: #2a2a2a; padding: 15px; margin: 10px 0; border-radius: 10px; text-align: left; transition: 0.3s; position: relative;}
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 1.2rem;}
        
        .item-dados { color: #ccc; font-size: 0.95rem; margin-bottom: 5px; line-height: 1.5; }
        .item-destaque { color: #fff; font-weight: bold; }
        
        .borda-amarela { border-left: 6px solid var(--warning); }
        .manobrista-nome { color: var(--warning); font-weight: bold; font-size: 1rem; display: block; margin-top: 5px;}

        .hidden { display: none !important; }
        
        .seletor-manobrista { display: flex; gap: 5px; margin-top: 10px;}
        .seletor-manobrista select { flex: 1; padding: 5px; background: #000; color: #fff; border: 1px solid #555; }
        
        @media (max-width: 768px) { .grid-2-colunas { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <button class="btn-menu" onclick="toggleMenu()">☰</button>
    <div class="overlay" id="menu-overlay" onclick="toggleMenu()"></div>
    
    <div class="menu-lateral" id="menu-lateral">
        <div id="menu-colab" class="menu-item hidden" onclick="abrirColaboradores()">👥 Colaboradores</div>
        <div id="menu-relatorio" class="menu-item hidden" onclick="baixarRelatorio()">📥 Baixar Relatório</div>
        <div class="menu-item" onclick="toggleFullScreen()">⛶ Tela Cheia</div>
        <div class="menu-item menu-danger" onclick="fazerLogout()">✖ Sair do Sistema</div>
    </div>

    <div class="container-logo">
        <h1 style="color: var(--primary); margin:0;">ESTAPAR VALET</h1>
    </div>

    <div class="view-toggle">
        <button id="btn-caixa" class="btn-aba" onclick="mudarPerfil('caixa')">CAIXA</button>
        <button id="btn-solicitacoes" class="btn-aba" onclick="mudarPerfil('solicitacoes')">SOLICITAÇÕES</button>
        <button id="btn-painel" class="btn-aba" onclick="mudarPerfil('painel')">PAINEL</button>
    </div>

    <div id="tela-caixa" class="container hidden">
        <h2>SOLICITAR VEÍCULO</h2>
        <div class="form-grupo">
            <input type="text" id="input-placa" placeholder="Placa (Ex: ABC1234)">
            <input type="text" id="input-modelo" placeholder="Modelo do Carro">
            <input type="text" id="input-prisma" placeholder="Nº do Prisma">
        </div>
        <div class="botoes-acao">
            <button class="btn-limpar" onclick="limparFormulario()">LIMPAR</button> 
            <button class="btn-enviar" onclick="enviarPedido()">ENVIAR</button>
        </div>
    </div>

    <div id="tela-colaboradores" class="container hidden">
        <h2 id="titulo-form-colab">ADICIONAR COLABORADOR</h2>
        <div class="form-grupo">
            <input type="hidden" id="colab-id">
            <input type="text" id="colab-nome" placeholder="Nome do Colaborador">
            <input type="text" id="colab-matricula" placeholder="Matrícula ou CPF">
            <input type="time" id="colab-entrada" placeholder="Horário Entrada (Ex: 08:00)">
            <input type="time" id="colab-saida" placeholder="Horário Saída (Ex: 18:00)">
            <input type="text" id="colab-escala" placeholder="Escala (Ex: 6x1)">
        </div>
        <div class="botoes-acao">
            <button class="btn-limpar" onclick="limparFormColab()">CANCELAR</button>
            <button class="btn-enviar" onclick="salvarColaborador()">SALVAR</button>
        </div>
        
        <h3 style="margin-top:30px;">Equipe Cadastrada</h3>
        <div id="lista-colaboradores" style="text-align:left;"></div>
    </div>

    <div id="tela-solicitacoes" class="container container-largo hidden">
        <div class="grid-2-colunas">
            <div class="coluna-painel">
                <h3 style="color: var(--info);">SOLICITADOS (Aguardando)</h3>
                <div id="solicitacoes-col-1"></div>
            </div>
            <div class="coluna-painel">
                <h3 style="color: var(--warning);">EM MANOBRA</h3>
                <div id="solicitacoes-col-2"></div>
            </div>
        </div>
    </div>

    <div id="tela-painel" class="container container-largo hidden">
        <h3 style="color: var(--info);">TEMPO MÉDIO (TMA): <span id="display-tma">Calculando...</span></h3>
        <div class="grid-2-colunas">
            <div class="coluna-painel">
                <h3>SOLICITAÇÕES (Na Fila)</h3>
                <div id="painel-col-1"></div>
            </div>
            <div class="coluna-painel">
                <h3 style="color: var(--primary);">ENTREGUE (Últimos 20)</h3>
                <div id="painel-col-2"></div>
            </div>
        </div>
    </div>

    <script>
        var perfilAtual = ""; 
        var listaGlobalColaboradores = [];

        // Inicialização Forçada: Mostra o caixa primeiro, checa acesso depois
        window.onload = function() {
            mudarPerfil('caixa'); 
            configurarAcessos();  
        };

        function toggleMenu() {
            document.getElementById("menu-lateral").classList.toggle("aberto");
            document.getElementById("menu-overlay").classList.toggle("ativo");
        }

        function abrirColaboradores() {
            toggleMenu();
            mudarPerfil('colaboradores');
        }

        function baixarRelatorio() { 
            toggleMenu();
            window.location.href = "/api/relatorio"; 
        }

        function fazerLogout() { window.location.href = window.location.protocol + "//sair:sair@" + window.location.host; }

        function toggleFullScreen() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); } 
            else if (document.exitFullscreen) { document.exitFullscreen(); }
            toggleMenu();
        }

        function configurarAcessos() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "/api/perfil", true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var res = JSON.parse(xhr.responseText);
                    var u = res.usuario ? res.usuario.toLowerCase() : "";
                    if (u === "estapar") {
                        document.getElementById("menu-relatorio").classList.remove("hidden");
                        document.getElementById("menu-colab").classList.remove("hidden");
                    }
                }
            };
            xhr.send();
        }

        function limparFormulario() {
            document.getElementById("input-placa").value = "";
            document.getElementById("input-modelo").value = "";
            document.getElementById("input-prisma").value = "";
        }

        function enviarPedido() {
            var prisma = document.getElementById("input-prisma").value.trim();
            if (prisma === "") { alert("PRISMA obrigatório!"); return; }

            var dados = {
                id: Date.now(), 
                placa: document.getElementById("input-placa").value,
                modelo: document.getElementById("input-modelo").value,
                prisma: prisma,
                hora_solicitacao: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
            };
            
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/api/adicionar", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    limparFormulario();
                    solicitarAtualizacaoDados();
                }
            };
            xhr.send(JSON.stringify(dados));
        }

        /* ----- FUNÇÕES DE COLABORADORES ----- */
        function limparFormColab() {
            document.getElementById("colab-id").value = "";
            document.getElementById("colab-nome").value = "";
            document.getElementById("colab-matricula").value = "";
            document.getElementById("colab-entrada").value = "";
            document.getElementById("colab-saida").value = "";
            document.getElementById("colab-escala").value = "";
            document.getElementById("titulo-form-colab").innerText = "ADICIONAR COLABORADOR";
        }

        function salvarColaborador() {
            var idEdit = document.getElementById("colab-id").value;
            var dados = {
                id: idEdit ? parseInt(idEdit) : Date.now(),
                nome: document.getElementById("colab-nome").value,
                matricula: document.getElementById("colab-matricula").value,
                entrada: document.getElementById("colab-entrada").value,
                saida: document.getElementById("colab-saida").value,
                escala: document.getElementById("colab-escala").value
            };
            
            if(!dados.nome || !dados.matricula) return alert("Nome e Matrícula são obrigatórios!");

            var endpoint = idEdit ? "/api/colaborador/editar" : "/api/colaborador/adicionar";

            var xhr = new XMLHttpRequest();
            xhr.open("POST", endpoint, true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    limparFormColab();
                    solicitarAtualizacaoDados();
                }
            };
            xhr.send(JSON.stringify(dados));
        }

        function editarColaborador(id) {
            var c = listaGlobalColaboradores.find(function(x) { return x.id === id; });
            if(!c) return;
            
            document.getElementById("colab-id").value = c.id;
            document.getElementById("colab-nome").value = c.nome;
            document.getElementById("colab-matricula").value = c.matricula;
            document.getElementById("colab-entrada").value = c.entrada;
            document.getElementById("colab-saida").value = c.saida;
            document.getElementById("colab-escala").value = c.escala;
            document.getElementById("titulo-form-colab").innerText = "EDITAR COLABORADOR";
            window.scrollTo(0, 0);
        }

        function excluirColaborador(id) {
            if(!confirm("Tem certeza que deseja EXCLUIR este colaborador?")) return;
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/api/colaborador/excluir", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) solicitarAtualizacaoDados();
            };
            xhr.send(JSON.stringify({id: id}));
        }

        /* ----- ATUALIZAÇÃO E RENDERIZAÇÃO ----- */
        function solicitarAtualizacaoDados() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "/api/dados", true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var dados = JSON.parse(xhr.responseText);
                    listaGlobalColaboradores = dados.colaboradores;
                    
                    if (perfilAtual === 'colaboradores') renderizarColab(dados.colaboradores);
                    if (perfilAtual === 'solicitacoes') renderizarSolicitacoes(dados.fila);
                    if (perfilAtual === 'painel') renderizarPainel(dados);
                }
            };
            xhr.send();
        }

        function obterColaboradoresDisponiveis() {
            var agora = new Date();
            var horaAtual = agora.getHours() * 60 + agora.getMinutes();
            
            return listaGlobalColaboradores.filter(function(c) {
                if(!c.entrada || !c.saida) return true; 
                var ent = c.entrada.split(":");
                var sai = c.saida.split(":");
                var minEnt = parseInt(ent[0])*60 + parseInt(ent[1]);
                var minSai = parseInt(sai[0])*60 + parseInt(sai[1]);
                
                if (minSai < minEnt) { 
                    return horaAtual >= minEnt || horaAtual <= minSai;
                } else {
                    return horaAtual >= minEnt && horaAtual <= minSai;
                }
            });
        }

        function renderizarColab(colabs) {
            var div = document.getElementById("lista-colaboradores");
            div.innerHTML = "";
            colabs.forEach(function(c) {
                div.innerHTML += 
                "<div class='item-fila'><strong>" + c.nome + "</strong> (" + c.matricula + ") <br><small>" + c.entrada + " às " + c.saida + " - " + c.escala + "</small>" +
                "<div style='margin-top:10px; display:flex; gap:10px;'>" +
                    "<button class='btn-buscar' onclick='editarColaborador(" + c.id + ")'>EDITAR</button>" +
                    "<button class='btn-excluir' onclick='excluirColaborador(" + c.id + ")'>EXCLUIR</button>" +
                "</div></div>";
            });
        }

        /* TELA DE SOLICITAÇÕES */
        function renderizarSolicitacoes(fila) {
            var col1 = document.getElementById("solicitacoes-col-1");
            var col2 = document.getElementById("solicitacoes-col-2");
            col1.innerHTML = ""; col2.innerHTML = "";

            var disponiveis = obterColaboradoresDisponiveis();
            var optionsHTML = "<option value=''>Selecione o Manobrista...</option>";
            disponiveis.forEach(function(c) {
                optionsHTML += "<option value='" + c.nome + "'>" + c.matricula + " - " + c.nome + "</option>";
            });

            fila.forEach(function(carro) {
                var info = "<strong>Prisma: " + carro.prisma + "</strong><br>" +
                           "<div class='item-dados'>" + 
                               "Modelo: <span class='item-destaque'>" + carro.modelo + "</span> | " +
                               "Placa: <span class='item-destaque'>" + carro.placa + "</span><br>" +
                               "Solicitado: " + carro.hora_solicitacao + 
                           "</div>";
                
                if(carro.status === "solicitado") {
                    var dropID = "drop-" + carro.id;
                    col1.innerHTML += 
                        "<div class='item-fila'>" + info + 
                        "<div style='margin-top:10px;'><button class='btn-buscar' onclick='mostrarDropdown(" + carro.id + ")'>BUSCAR</button></div>" +
                        "<div id='" + dropID + "' class='seletor-manobrista hidden'>" +
                            "<select id='sel-" + carro.id + "'>" + optionsHTML + "</select>" +
                            "<button class='btn-enviar' onclick='atribuirManobrista(" + carro.id + ")'>OK</button>" +
                        "</div></div>";
                } else {
                    col2.innerHTML += 
                        "<div class='item-fila borda-amarela'>" + info + 
                        "<span class='manobrista-nome'>Resp: " + carro.manobrista + "</span>" +
                        "<div style='margin-top:10px; text-align:right;'><button class='btn-baixa' onclick='darBaixa(" + carro.id + ")'>BAIXA</button></div></div>";
                }
            });
        }

        function mostrarDropdown(id) {
            document.getElementById("drop-" + id).classList.remove("hidden");
        }

        function atribuirManobrista(id) {
            var sel = document.getElementById("sel-" + id).value;
            var payload = { id: id, manobrista: sel || "Não Informado" };
            
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/api/atribuir", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function() { if (xhr.readyState === 4) solicitarAtualizacaoDados(); };
            xhr.send(JSON.stringify(payload));
        }

        function darBaixa(id) {
            var dados = { id: id, timestamp_baixa: Date.now(), hora_baixa: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) };
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/api/baixa", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function() { if (xhr.readyState === 4) solicitarAtualizacaoDados(); };
            xhr.send(JSON.stringify(dados));
        }

        /* TELA DO PAINEL */
        function renderizarPainel(dados) {
            document.getElementById("display-tma").innerText = Math.round(dados.tempo_medio / 60000) + " min";
            var col1 = document.getElementById("painel-col-1");
            var col2 = document.getElementById("painel-col-2");
            col1.innerHTML = ""; col2.innerHTML = "";

            dados.fila.forEach(function(carro) {
                var cssClasse = carro.status === "em_manobra" ? "borda-amarela" : "";
                var manoHtml = carro.status === "em_manobra" ? "<span class='manobrista-nome'>Resp: " + carro.manobrista + "</span>" : "";
                
                col1.innerHTML += 
                    "<div class='item-fila " + cssClasse + "'>" +
                        "<strong>Prisma: " + carro.prisma + "</strong><br>" +
                        "<div class='item-dados'>" + 
                            "Modelo: <span class='item-destaque'>" + carro.modelo + "</span> | " +
                            "Placa: <span class='item-destaque'>" + carro.placa + "</span><br>" +
                            "Solicitado: " + carro.hora_solicitacao + 
                        "</div>" + manoHtml +
                    "</div>";
            });

            var histTela = dados.historico.slice(0, 20);
            histTela.forEach(function(carro) {
                col2.innerHTML += 
                    "<div class='item-fila' style='border-left: 5px solid var(--primary);'>" +
                        "<strong>Prisma: " + carro.prisma + "</strong><br>" +
                        "<div class='item-dados'>" + 
                            "Modelo: <span class='item-destaque'>" + carro.modelo + "</span> | " +
                            "Placa: <span class='item-destaque'>" + carro.placa + "</span><br>" +
                            "Solicitado: " + carro.hora_solicitacao + "<br>" +
                            "Resp: " + (carro.manobrista||"N/A") + "<br>" +
                            "Entregue às: <span class='item-destaque'>" + carro.hora_baixa + "</span>" +
                        "</div>" +
                    "</div>";
            });
        }

        function mudarPerfil(aba) {
            perfilAtual = aba;
            document.querySelectorAll('.btn-aba').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            
            if(aba === 'caixa') { document.getElementById('btn-caixa').classList.add('active'); document.getElementById('tela-caixa').classList.remove('hidden'); }
            if(aba === 'colaboradores') { document.getElementById('tela-colaboradores').classList.remove('hidden'); solicitarAtualizacaoDados(); }
            if(aba === 'solicitacoes') { document.getElementById('btn-solicitacoes').classList.add('active'); document.getElementById('tela-solicitacoes').classList.remove('hidden'); solicitarAtualizacaoDados(); }
            if(aba === 'painel') { document.getElementById('btn-painel').classList.add('active'); document.getElementById('tela-painel').classList.remove('hidden'); solicitarAtualizacaoDados(); }
        }

        setInterval(function() {
            if (perfilAtual !== 'caixa' && perfilAtual !== 'colaboradores') solicitarAtualizacaoDados();
        }, 10000);
    </script>
</body>
</html>
