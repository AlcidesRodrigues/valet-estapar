<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    
    <title>Gerenciador de Fila - Valet</title>
    
    <link rel="icon" type="image/png" href="ESTAPAR-04.png">
    <link rel="apple-touch-icon" href="ESTAPAR-04.png">
    
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --primary: #4CAF50; --danger: #f44336; --info: #2196F3; --warning: #ff9800; --text: #ffffff; }
        body { font-family: Arial, sans-serif; background-color: var(--bg-color); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        
        .btn-fullscreen { position: absolute; top: 15px; right: 15px; background: #333; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 5px; z-index: 1000; }
        
        .container-logo { display: flex; justify-content: center; align-items: center; width: 100%; margin-bottom: 25px; margin-top: 20px; }
        .logo-estapar { width: 250px; height: auto; display: block; }

        .container { width: 100%; max-width: 600px; background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        .container-painel { max-width: 900px; }

        /* Formulário do Caixa */
        .form-grupo { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .form-grupo input { padding: 15px; font-size: 1.5rem; border-radius: 10px; border: 1px solid #444; background: #000; color: var(--primary); text-align: center; font-weight: bold; }
        .form-grupo input::placeholder { color: #555; font-weight: normal; }

        button { padding: 15px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        
        .botoes-acao { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .btn-enviar { background: var(--primary); }
        .btn-limpar { background: var(--danger); }
        
        .botoes-extras { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn-ps { background: var(--info); }
        .btn-futuro { background: #262626; color: #666; }

        /* Listas e Painel */
        .item-fila { display: flex; flex-direction: column; background: #2a2a2a; padding: 15px; margin: 10px 0; border-radius: 10px; text-align: left; font-size: 1.2rem; transition: 0.3s; }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 1.4rem;}
        .item-dados { color: #aaa; font-size: 1rem; }
        
        .btn-baixa { background: var(--danger); font-size: 1.1rem; padding: 10px 20px; align-self: flex-end; margin-top: 10px;}

        /* Colunas do Painel do Cliente */
        .painel-header-box { background: var(--info); padding: 15px; border-radius: 10px; font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .painel-grid { display: flex; gap: 20px; }
        .painel-coluna { flex: 1; background: #222; padding: 15px; border-radius: 10px; }
        .painel-coluna h3 { margin-top: 0; color: var(--warning); border-bottom: 2px solid #444; padding-bottom: 10px; text-align: center;}
        
        /* ALERTA PISCANDO EM VERMELHO */
        .alerta-atraso { animation: piscarVermelho 1s infinite alternate; border: 2px solid #ff0000; }
        @keyframes piscarVermelho { 0% { background-color: #2a2a2a; } 100% { background-color: #630000; } }

        /* Abas Superiores */
        .view-toggle { margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 900px;}
        .btn-aba { flex: 1; min-width: 120px; padding: 15px 20px; background: #3c3c3c; color: #aaaaaa; opacity: 0.8; font-weight: normal; }
        .btn-aba.active { background: var(--info); color: #ffffff; opacity: 1; font-weight: bold; box-shadow: 0 0 10px rgba(33, 150, 243, 0.5); }
        
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .painel-grid { flex-direction: column; }
        }
    </style>
</head>
