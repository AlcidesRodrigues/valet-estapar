<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    
    <title>Gerenciador de Fila - Valet</title>
    
    <link rel="icon" type="image/png" href="ESTAPAR-16.png">
    <link rel="apple-touch-icon" href="ESTAPAR-04.png">
    
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --primary: #4CAF50; --danger: #f44336; --info: #2196F3; --warning: #ff9800; --text: #ffffff; }
        body { font-family: Arial, sans-serif; background-color: var(--bg-color); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        
        .btn-fullscreen { position: absolute; top: 15px; right: 15px; background: #333; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 5px; z-index: 1000; }
        
        .container-logo { display: flex; justify-content: center; align-items: center; width: 100%; margin-bottom: 25px; margin-top: 20px; }
        .logo-estapar { width: 250px; height: auto; display: block; }

        .container { width: 100%; max-width: 600px; background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        .container-painel { max-width: 900px; }

        /* Formulário do Caixa */
        .form-grupo { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .form-grupo input { padding: 15px; font-size: 1.5rem; border-radius: 10px; border: 1px solid #444; background: #000; color: var(--primary); text-align: center; font-weight: bold; }
        .form-grupo input::placeholder { color: #555; font-weight: normal; }

        button { padding: 15px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        
        .botoes-acao { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .btn-enviar { background: var(--primary); }
        .btn-limpar { background: var(--danger); }
        
        .botoes-extras { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn-ps { background: var(--info); }
        .btn-futuro { background: #262626; color: #666; }

        /* Listas e Painel */
        .item-fila { display: flex; flex-direction: column; background: #2a2a2a; padding: 15px; margin: 10px 0; border-radius: 10px; text-align: left; font-size: 1.2rem; transition: 0.3s; }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 1.4rem;}
        .item-dados { color: #aaa; font-size: 1rem; }
        
        .btn-baixa { background: var(--danger); font-size: 1.1rem; padding: 10px 20px; align-self: flex-end; margin-top: 10px;}

        /* Colunas do Painel do Cliente */
        .painel-header-box { background: var(--info); padding: 15px; border-radius: 10px; font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .painel-grid { display: flex; gap: 20px; }
        .painel-coluna { flex: 1; background: #222; padding: 15px; border-radius: 10px; }
        .painel-coluna h3 { margin-top: 0; color: var(--warning); border-bottom: 2px solid #444; padding-bottom: 10px; text-align: center;}
        
        .alerta-atraso { animation: piscarVermelho 1s infinite alternate; border: 2px solid #ff0000; }
        @keyframes piscarVermelho { 0% { background-color: #2a2a2a; } 100% { background-color: #630000; } }

        /* Abas Superiores */
        .view-toggle { margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 900px;}
        .btn-aba { flex: 1; min-width: 120px; padding: 15px 20px; background: #3c3c3c; color: #aaaaaa; opacity: 0.8; font-weight: normal; }
        .btn-aba.active { background: var(--info); color: #ffffff; opacity: 1; font-weight: bold; box-shadow: 0 0 10px rgba(33, 150, 243, 0.5); }
        
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .painel-grid { flex-direction: column; }
        }
    </style>
</head>
<body>

    <button class="btn-fullscreen" onclick="toggleFullScreen()">⛶ Tela Cheia</button>

    <div class="container-logo">
        <img src="ESTAPAR-04.png" alt="Estapar Valet" class="logo-estapar">
    </div>

    <div class="view-toggle">
        <button id="btn-caixa" class="btn-aba active" onclick="mudarPerfil('caixa')">CAIXA</button>
        <button id="btn-solicitacoes" class="btn-aba" onclick="mudarPerfil('solicitacoes')">SOLICITAÇÕES</button>
        <button id="btn-painel" class="btn-aba" onclick="mudarPerfil('painel')">PAINEL (CLIENTE)</button>
    </div>

    <div id="tela-caixa" class="container">
        <h2>SOLICITAR VEÍCULO</h2>
        
        <div class="form-grupo">
            <input type="text" id="input-placa" placeholder="Placa (Ex: ABC1234)" style="text-transform: uppercase;">
            <input type="text" id="input-modelo" list="lista-modelos" placeholder="Modelo do Carro" style="text-transform: uppercase;">
            
            <datalist id="lista-modelos">
                <option value="AUDI">
                <option value="BMW">
                <option value="BYD">
                <option value="CAOA CHERY">
                <option value="CHEVROLET">
                <option value="CITROËN">
                <option value="FIAT">
                <option value="FORD">
                <option value="HONDA">
                <option value="HYUNDAI">
                <option value="JEEP">
                <option value="KIA">
                <option value="LAND ROVER">
                <option value="MERCEDES-BENZ">
                <option value="MITSUBISHI">
                <option value="NISSAN">
                <option value="PEUGEOT">
                <option value="RENAULT">
                <option value="TOYOTA">
                <option value="VOLKSWAGEN">
                <option value="VOLVO">
            </datalist>

            <input type="text" id="input-prisma" placeholder="Nº do Prisma">
        </div>

        <div class="botoes-acao">
            <button class="btn-limpar" onclick="limparFormulario()">LIMPAR</button> 
            <button class="btn-enviar" onclick="enviarPedido()">ENVIAR</button>
        </div>
        
        <div class="botoes-extras">
            <button id="btn-ps" class="btn-ps" onclick="botaoPsPressionado()">PS</button>
            <button id="btn-vazio1" class="btn-futuro" onclick="botaoFuturo()">-</button>
            <button id="btn-vazio2" class="btn-futuro" onclick="botaoFuturo()">-</button>
            <button id="btn-vazio3" class="btn-futuro" onclick="botaoFuturo()">-</button>
        </div>
    </div>

    <div id="tela-solicitacoes" class="container hidden">
        <h2>FILA DE SOLICITAÇÕES</h2>
        <div id="lista-fila"></div>
    </div>

    <div id="tela-painel" class="container container-painel hidden">
        <div class="painel-header-box">
            TEMPO MÉDIO DE ESPERA: <span id="display-tempo-medio">Calculando...</span>
        </div>
        
        <div class="painel-grid">
            <div class="painel-coluna">
                <h3>SOLICITAÇÕES (Na Fila)</h3>
                <div id="painel-col-solicitacoes"></div>
            </div>
            
            <div class="painel-coluna">
                <h3>PERCURSO (Últimos 20)</h3>
                <div id="painel-col-percurso"></div>
            </div>
        </div>
    </div>

    <script>
        let perfilAtual = "caixa"; 
        let tempoMedioAtualMs = 600000; 

        function botaoPsPressionado() {
            try {
                document.getElementById("input-prisma").value = "PS";
            } catch(e) { console.error(e); }
        }
        function botaoFuturo() {
            console.log("Botão reservado para o futuro.");
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {});
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
        }

        function limparFormulario() {
            try {
                document.getElementById("input-placa").value = "";
                document.getElementById("input-modelo").value = "";
                document.getElementById("input-prisma").value = "";
            } catch(e) { console.error(e); }
        }

        function enviarPedido() {
            try {
                let placa = document.getElementById("input-placa").value.trim();
                let modelo = document.getElementById("input-modelo").value.trim();
                let prisma = document.getElementById("input-prisma").value.trim();

                if (prisma === "") {
                    alert("O campo PRISMA é obrigatório!");
                    return;
                }

                let novoCarro = {
                    id: Date.now(), 
                    placa: placa,
                    modelo: modelo,
                    prisma: prisma,
                    hora_solicitacao: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
                };
                
                fetch('/api/adicionar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(novoCarro)
                }).then(response => {
                    if (!response.ok) {
                        alert("PRISMA JÁ SOLICITADO");
                    } else {
                        limparFormulario();
                        solicitarAtualizacaoDados();
                    }
                }).catch(erro => {
                    alert("Erro ao enviar pedido. Verifique sua conexão.");
                });
            } catch(e) { console.error(e); }
        }

        function darBaixa(id) {
            try {
                let dadosBaixa = {
                    id: id,
                    timestamp_baixa: Date.now(),
                    hora_baixa: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
                };

                fetch('/api/baixa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosBaixa)
                }).then(() => {
                    solicitarAtualizacaoDados();
                }).catch(erro => {
                    console.error("Erro na baixa:", erro);
                });
            } catch(e) { console.error(e); }
        }

        function solicitarAtualizacaoDados() {
            fetch('/api/dados')
                .then(response => {
                    if (!response.ok) throw new Error("Erro na rede");
                    return response.json();
                })
                .then(dados => {
                    tempoMedioAtualMs = dados.tempo_medio;
                    if (perfilAtual === 'solicitacoes') renderizarSolicitacoes(dados.fila);
                    if (perfilAtual === 'painel') renderizarPainel(dados);
                })
                .catch(erro => {
                    console.log("Aguardando servidor ou erro de conexão...");
                });
        }

        function renderizarSolicitacoes(fila) {
            try {
                const listaDiv = document.getElementById("lista-fila");
                listaDiv.innerHTML = "";
                
                if (!fila || fila.length === 0) {
                    listaDiv.innerHTML = "<p style='color: #888;'>Nenhum veículo na fila.</p>";
                    return;
                }

                const agora = Date.now();

                fila.forEach((carro, index) => {
                    const tempoDecorridoMs = agora - carro.id;
                    let classeAlerta = "";
                    if (tempoDecorridoMs > tempoMedioAtualMs) {
                        classeAlerta = "alerta-atraso";
                    }

                    listaDiv.innerHTML += `
                        <div class="item-fila ${classeAlerta}">
                            <div class="item-header">
                                <span><strong>${index + 1}º</strong> - Prisma: <strong>${carro.prisma}</strong></span>
                                <span style="color:var(--info);">${carro.hora_solicitacao}</span>
                            </div>
                            <div class="item-dados">
                                Placa: ${carro.placa || 'N/A'} | Modelo: ${carro.modelo || 'N/A'}
                            </div>
                            <button class="btn-baixa" onclick="darBaixa(${carro.id})">BAIXA</button>
                        </div>
                    `;
                });
            } catch(e) { console.error(e); }
        }

        function formatarTempo(ms) {
            let minutos = Math.round(ms / 60000);
            return minutos + " min";
        }

        function renderizarPainel(dados) {
            try {
                document.getElementById("display-tempo-medio").innerText = formatarTempo(dados.tempo_medio);

                const colSolicitacoes = document.getElementById("painel-col-solicitacoes");
                colSolicitacoes.innerHTML = "";
                if (dados.fila.length === 0) {
                    colSolicitacoes.innerHTML = "<p style='color:#666; text-align:center;'>Vazio</p>";
                } else {
                    dados.fila.forEach((carro) => {
                        colSolicitacoes.innerHTML += `
                            <div class="item-fila" style="padding:10px;">
                                <strong>Prisma: ${carro.prisma}</strong>
                                <div class="item-dados" style="font-size:0.9rem;">
                                    Placa: ${
